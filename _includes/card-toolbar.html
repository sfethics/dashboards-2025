<div class="card-action-toolbar" role="toolbar" aria-label="Card actions">
<button
  type="button"
  class="btn btn-sm btn-outline-secondary card-action-btn"
  data-bs-toggle="offcanvas"
  data-bs-target="#{{ include.offcanvas_id }}"
  aria-controls="{{ include.offcanvas_id }}">
  <i class="fa-light fa-circle-info" aria-hidden="true"></i>
  <span>About data</span>
</button>

  <button
    type="button"
    class="btn btn-sm btn-outline-secondary card-action-btn copy-link-btn"
    data-copy-link="{{ include.link }}">
    <i class="fa-light fa-copy" aria-hidden="true"></i>
    <span>Copy link</span>
  </button>
</div>
